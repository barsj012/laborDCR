<script type="text/babel">

// ─── Constants ──────────────────────────────────────────────────────────────
const SB = {
  green:"#00704A", darkGreen:"#1E3932", lightGreen:"#D4E9E2",
  gold:"#CBA258", white:"#FFFFFF", cream:"#F2EFE8",
  gray:"#747474", lightGray:"#EDEBE4", black:"#1E1E1E",
  red:"#c0392b", blue:"#1a6091"
};
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const TOLERANCE = 0.5;
const TSD_CHART = [
  {min:0,   max:24,       label:"0-1",  hours:0},
  {min:24,  max:39,       label:"1-2",  hours:1.5},
  {min:39,  max:54,       label:"2-3",  hours:2.5},
  {min:54,  max:68,       label:"3-4",  hours:3.5},
  {min:68,  max:83,       label:"4-5",  hours:4.5},
  {min:83,  max:98,       label:"5-6",  hours:5.5},
  {min:98,  max:124,      label:"6-7",  hours:6.5},
  {min:124, max:154,      label:"7-8",  hours:7.5},
  {min:154, max:Infinity, label:"7-8+", hours:8}
];

// ─── Helpers ────────────────────────────────────────────────────────────────
function generateSlots() {
  const s=[];
  for(let h=5;h<20;h++){s.push({hour:h,min:0});s.push({hour:h,min:30});}
  s.push({hour:20,min:0}); return s;
}
const SLOTS = generateSlots();
function fmtTime(h,m){const a=h<12?"AM":"PM",h2=h===0?12:h>12?h-12:h;return h2+":"+(m===0?"00":"30")+" "+a;}
function timeToDecimal(h,m){return h+m/60;}
function parseTimeInput(str){
  if(!str)return null;
  str=str.trim().toLowerCase().replace(/\s+/g,"");
  let a=null;
  if(str.endsWith("am")||str.endsWith("a")){a="am";str=str.replace(/(am|a)$/,"");}
  else if(str.endsWith("pm")||str.endsWith("p")){a="pm";str=str.replace(/(pm|p)$/,"");}
  const p=str.split(/[:.]/);let h=parseInt(p[0]);const m=p[1]?parseInt(p[1]):0;
  if(isNaN(h))return null;
  if(a==="pm"&&h!==12)h+=12;if(a==="am"&&h===12)h=0;if(a===null&&h<5)h+=12;
  return{h,m};
}
function getTSDRow(t){return TSD_CHART.find(r=>t>=r.min&&t<r.max)||TSD_CHART[TSD_CHART.length-1];}
function getDirection(extra,justH){
  const diff=extra-justH;
  if(diff>TOLERANCE) return{type:"cut",hrs:diff};
  if(diff<-TOLERANCE)return{type:"add",hrs:Math.abs(diff)};
  return{type:"hold",hrs:0};
}
const DIR_CFG={
  cut: {color:SB.red,   bg:"#fff5f5",border:SB.red,   pip:SB.red,   verb:"Cut",         suffix:"hrs",sub:"transactions don't justify your current labor"},
  hold:{color:SB.green, bg:"#f4f9f7",border:SB.green, pip:SB.green, verb:"Keep all staff",suffix:"",  sub:"labor and sales are in balance"},
  add: {color:SB.blue,  bg:"#f0f6fb",border:SB.blue,  pip:SB.blue,  verb:"Add up to",   suffix:"hrs",sub:"your volume is outpacing your staffing"},
};

// ─── Storage — localStorage cache + Firebase sync ────────────────────────────
function lsGet(key){try{const v=localStorage.getItem(key);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(key,val){try{localStorage.setItem(key,JSON.stringify(val));return true;}catch(e){return false;}}
function dayKey(day,type){return `laborDCR_${type}_${day}_v3`;}
// Firebase path mirrors the localStorage key
function fbPath(key){return "laborDCR/"+key.replace(/\./g,"_");}
// Write to both localStorage and Firebase
function syncSet(key,val){
  lsSet(key,val);
  if(window._fbSet){
    window._fbSet(fbPath(key), val).catch(e=>console.warn("FB write failed",e));
  }
}
// Read from Firebase (falls back to localStorage)
async function syncGet(key){
  if(window._fbGet){
    try{
      const val = await window._fbGet(fbPath(key));
      if(val!==null){lsSet(key,val);return val;}
    }catch(e){console.warn("FB read failed",e);}
  }
  return lsGet(key);
}
// Live listener — calls cb whenever Firebase data changes, returns unsubscribe fn
function syncListen(key, cb){
  if(window._fbListen){
    const unsub = window._fbListen(fbPath(key), val=>{
      if(val!==null){lsSet(key,val);cb(val);}
    });
    return unsub || (()=>{});
  }
  return ()=>{};
}

// ─── Default setup state ──────────────────────────────────────────────────────
function defaultSetup(){
  return{planned:"",scheduled:"",dayLabel:"",dailyTSD:"",managerNote:"",
    windows:[{start:"7a",end:"10a"}],projTSD:Array(SLOTS.length).fill(""),
    checkIns:["Before Peak","After Peak","2:00 PM","4:00 PM"],published:false};
}
function defaultLive(){return{actTSD:Array(SLOTS.length).fill(""),cutsLog:[]};}

// ─── Phased guidance ─────────────────────────────────────────────────────────
function getPhasedGuidance(dirType,totalHrs,currentSlot,parsedWins){
  if(!currentSlot)return null;
  const now=timeToDecimal(currentSlot.hour,currentSlot.min);
  const peakStart=parsedWins.length>0?Math.min(...parsedWins.map(w=>timeToDecimal(w.sh,w.sm))):null;
  const peakEnd  =parsedWins.length>0?Math.max(...parsedWins.map(w=>timeToDecimal(w.eh,w.em))):null;
  let phase;
  if(peakStart===null)          phase="no-windows";
  else if(now<peakStart)        phase="pre-peak";
  else if(now<=peakEnd)         phase="in-peak";
  else if(now<=peakEnd+1)       phase="post-peak";
  else                          phase="late-day";
  const peakEndStr=peakEnd?fmtTime(Math.floor(peakEnd),(peakEnd%1)*60):null;
  const rnd=v=>Math.round(v*2)/2;
  if(dirType==="cut"){
    const h=totalHrs;
    if(phase==="pre-peak"){const n=rnd(h*0.25),l=rnd(h-n);return{now:n,later:l,nowLabel:"Trim now",laterLabel:"Cut more after peak if trend holds",note:`You're before peak — don't over-cut. Release ${n.toFixed(2)} hrs from early/slow positions now. If transactions stay flat past ${peakEndStr}, cut ${l.toFixed(2)} more to get fully back on track.`,caution:true};}
    if(phase==="in-peak"){return{now:0,later:h,nowLabel:"Hold cuts",laterLabel:"Cut after peak if trend holds",note:`You're in your peak window — hold all cuts. Reassess at ${peakEndStr}. If trend continues, cut ${h.toFixed(2)} hrs from afternoon/closing shifts.`,caution:true};}
    if(phase==="post-peak"){const n=rnd(h*0.5),l=rnd(h-n);return{now:n,later:l,nowLabel:"Cut now",laterLabel:"Cut more if volume stays flat",note:`Just past peak. Cut ${n.toFixed(2)} hrs now from remaining afternoon shifts. If volume stays flat for the next hour, cut ${l.toFixed(2)} more to get fully on track.`,caution:false};}
    if(phase==="late-day"){const n=rnd(h*0.65),l=rnd(h-n);return{now:n,later:l,nowLabel:"Cut now",laterLabel:"Cut remaining from close",note:`Past peak and late in the day — safe to cut. Release ${n.toFixed(2)} hrs now. Cut the remaining ${l.toFixed(2)} hrs from closing shifts if no late rush.`,caution:false};}
    const n=rnd(h*0.5),l=rnd(h-n);return{now:n,later:l,nowLabel:"Cut now",laterLabel:"Cut more if trend holds",note:`Cut ${n.toFixed(2)} hrs now. If trend continues, cut ${l.toFixed(2)} more. Add peak windows in Setup for smarter timing.`,caution:false};
  }
  if(dirType==="add"){
    const h=totalHrs;
    if(phase==="pre-peak"||phase==="in-peak"){return{now:h,later:0,nowLabel:"Add now",laterLabel:"",note:`Volume justifies adding ${h.toFixed(2)} hrs — and you're heading into peak. Add labor now to stay ahead of the rush.`,caution:false};}
    const n=rnd(h*0.5),l=rnd(h-n);return{now:n,later:l,nowLabel:"Add now",laterLabel:"Add more if trend builds",note:`You have room to add ${h.toFixed(2)} hrs. Bring in ${n.toFixed(2)} hrs now. If volume keeps building, add ${l.toFixed(2)} more.`,caution:false};
  }
  return null;
}

const ce=React.createElement;

// ─── Small components ─────────────────────────────────────────────────────────
function SBLabel({children,noBottom}){return ce("div",{style:{fontSize:9,color:SB.darkGreen,textTransform:"uppercase",letterSpacing:"0.18em",fontWeight:700,marginBottom:noBottom?0:7}},children);}
function STH({children,white,green}){return ce("div",{style:{fontSize:9,color:white?SB.white:green?SB.darkGreen:SB.gray,textTransform:"uppercase",letterSpacing:"0.1em",padding:"8px 10px",fontWeight:700}},children);}
function Pill({label,value,color}){return ce("div",{style:{background:SB.white,border:"1px solid #ddd",borderRadius:8,padding:"7px 10px",flex:1,textAlign:"center"}},ce("div",{style:{fontSize:8,color:SB.gray,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}},label),ce("div",{style:{fontSize:13,fontWeight:700,color}},value));}
function Stat({label,value}){return ce("div",null,ce("div",{style:{fontSize:8,color:SB.lightGreen,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}},label),ce("div",{style:{fontSize:13,fontWeight:700,color:SB.white}},value));}
function CRow({label,value,color,sub}){return ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"6px 0",borderBottom:"1px solid #f0f0f0"}},ce("div",null,ce("span",{style:{fontSize:11,color:SB.gray}},label),sub&&ce("div",{style:{fontSize:9,color:"#aaa",marginTop:2,fontStyle:"italic",fontFamily:"sans-serif"}},sub)),ce("span",{style:{fontSize:12,fontWeight:600,color:color||SB.black,marginLeft:8,flexShrink:0}},value));}
function Pip({color,size}){const s=size||8;return ce("span",{style:{display:"inline-block",width:s,height:s,borderRadius:"50%",background:color,flexShrink:0,verticalAlign:"middle",marginRight:7,transform:"translateY(-1px)"}});}

// ─── App ──────────────────────────────────────────────────────────────────────
function App(){
  const todayIdx = (new Date().getDay()+6)%7; // 0=Mon
  const [activeDay,  setActiveDay]  = React.useState(todayIdx);
  const [view,       setView]       = React.useState("manager");
  const [saveMsg,    setSaveMsg]    = React.useState("");
  const [mathOpen,   setMathOpen]   = React.useState(false);
  const [loaded,     setLoaded]     = React.useState(false);
  const unsubRef = React.useRef(null); // holds the Firebase listener unsubscribe fn

  // Per-day setup
  const [planned,     setPlanned]     = React.useState("");
  const [scheduled,   setScheduled]   = React.useState("");
  const [dayLabel,    setDayLabel]    = React.useState("");
  const [dailyTSD,    setDailyTSD]    = React.useState("");
  const [managerNote, setManagerNote] = React.useState("");
  const [pastedDCR,   setPastedDCR]   = React.useState("");
  const [windows,     setWindows]     = React.useState([{start:"7a",end:"10a"}]);
  const [projTSD,     setProjTSD]     = React.useState(Array(SLOTS.length).fill(""));
  const [checkIns,    setCheckIns]    = React.useState(["Before Peak","After Peak","2:00 PM","4:00 PM"]);
  const [published,   setPublished]   = React.useState(false);

  // Per-day live
  const [actTSD,   setActTSD]   = React.useState(Array(SLOTS.length).fill(""));
  const [cutsLog,  setCutsLog]  = React.useState([]);
  const [cutEntry, setCutEntry] = React.useState({hrs:"",who:"",note:"",type:"cut"});

  // ── Load a day ──────────────────────────────────────────────────────────────
  async function loadDay(idx){
    const day=DAYS[idx];
    const s=(await syncGet(dayKey(day,"setup")))||defaultSetup();
    setPlanned(s.planned||""); setScheduled(s.scheduled||""); setDayLabel(s.dayLabel||"");
    setDailyTSD(s.dailyTSD||""); setManagerNote(s.managerNote||""); setPastedDCR(s.pastedDCR||"");
    setWindows(s.windows||[{start:"7a",end:"10a"}]);
    setProjTSD(s.projTSD||Array(SLOTS.length).fill(""));
    setCheckIns(s.checkIns||["Before Peak","After Peak","2:00 PM","4:00 PM"]);
    setPublished(s.published||false);
    const l=(await syncGet(dayKey(day,"live")))||defaultLive();
    setActTSD(l.actTSD||Array(SLOTS.length).fill(""));
    setCutsLog(l.cutsLog||[]);
    setCutEntry({hrs:"",who:"",note:"",type:"cut"});
    setMathOpen(false);
    setLoaded(true);
    // Unsubscribe previous day's listener before attaching new one
    if(unsubRef.current){ try{ unsubRef.current(); }catch(e){} unsubRef.current=null; }
    // Live listener — updates this device whenever another device writes
    const unsub = syncListen(dayKey(day,"live"), val=>{
      if(!val)return;
      setActTSD(val.actTSD||Array(SLOTS.length).fill(""));
      setCutsLog(val.cutsLog||[]);
    });
    unsubRef.current = unsub;
  }

  // Load today on mount
  React.useEffect(()=>{loadDay(todayIdx);},[]);

  // Auto-save live data to Firebase + localStorage — only after initial load
  React.useEffect(()=>{
    if(!loaded) return;
    const day=DAYS[activeDay];
    syncSet(dayKey(day,"live"),{actTSD,cutsLog});
  },[actTSD,cutsLog,activeDay,loaded]);


  // ── Switch day ───────────────────────────────────────────────────────────────
  function switchDay(idx){
    setLoaded(false);
    setActiveDay(idx);
    loadDay(idx);
  }

  // ── Save setup ───────────────────────────────────────────────────────────────
  function saveSetup(andPublish){
    const data={planned,scheduled,dayLabel,dailyTSD,managerNote,pastedDCR,windows,projTSD,checkIns,published:andPublish||published};
    const ok=true; syncSet(dayKey(DAYS[activeDay],"setup"),data);
    if(!ok){setSaveMsg("Save failed — check browser storage");setTimeout(()=>setSaveMsg(""),4000);return;}
    if(andPublish){setPublished(true);setView("screenshot");}
    setSaveMsg("Saved ✓"); setTimeout(()=>setSaveMsg(""),2500);
  }

  function saveLive(){
    const day=DAYS[activeDay];
    const ok=syncSet(dayKey(day,"live"),{actTSD,cutsLog});
    setSaveMsg("Live data saved ✓");
    setTimeout(()=>setSaveMsg(""),2500);
  }

  function refresh(){
    loadDay(activeDay);
    setSaveMsg("Refreshed ✓"); setTimeout(()=>setSaveMsg(""),2500);
  }

  function clearActuals(){
    if(!window.confirm("Clear actuals for this day?"))return;
    setActTSD(Array(SLOTS.length).fill(""));
    setCutsLog([]);
  }

  function resetDay(){
    if(!window.confirm(`Reset ALL data for ${DAYS[activeDay]}? This cannot be undone.`))return;
    const day=DAYS[activeDay];
    localStorage.removeItem(dayKey(day,"setup"));
    localStorage.removeItem(dayKey(day,"live"));
    if(window._fbSet){window._fbSet("laborDCR/"+dayKey(day,"setup"),null);window._fbSet("laborDCR/"+dayKey(day,"live"),null);}
    const d=defaultSetup(); const l=defaultLive();
    setPlanned(""); setScheduled(""); setDayLabel(""); setDailyTSD(""); setManagerNote("");
    setWindows([{start:"7a",end:"10a"}]); setProjTSD(Array(SLOTS.length).fill("")); setPastedDCR("");
    setCheckIns(["Before Peak","After Peak","2:00 PM","4:00 PM"]); setPublished(false);
    setActTSD(Array(SLOTS.length).fill("")); setCutsLog([]); setCutEntry({hrs:"",who:"",note:""});
    setSaveMsg(`${DAYS[activeDay]} reset ✓`); setTimeout(()=>setSaveMsg(""),2500);
  }

  function resetWeek(){
    if(!window.confirm("Reset ALL data for the entire week? This cannot be undone."))return;
    DAYS.forEach(d=>{localStorage.removeItem(dayKey(d,"setup"));localStorage.removeItem(dayKey(d,"live"));if(window._fbSet){window._fbSet("laborDCR/"+dayKey(d,"setup"),null);window._fbSet("laborDCR/"+dayKey(d,"live"),null);}});
    loadDay(activeDay);
    setSaveMsg("Week reset ✓"); setTimeout(()=>setSaveMsg(""),2500);
  }

  // ── Cuts ─────────────────────────────────────────────────────────────────────
  function logCut(){
    const hrsNum=parseFloat(cutEntry.hrs);
    if(isNaN(hrsNum)||hrsNum<=0)return;
    const entry={time:Date.now(),hrs:hrsNum,who:cutEntry.who.trim(),note:cutEntry.note.trim(),type:cutEntry.type||"cut"};
    setCutsLog(p=>[entry,...p]);
    setCutEntry({hrs:"",who:"",note:""});
  }
  function removeCut(idx){setCutsLog(p=>p.filter((_,i)=>i!==idx));}

  // ── Paste handler ─────────────────────────────────────────────────────────────
  function handlePaste(e){
    const raw=e.target.value;
    setPastedDCR(raw);
    const nums=raw.replace(/running total/i,"").trim().split(/[\t,\s]+/).map(v=>v.trim()).filter(v=>v!==""&&!isNaN(v));
    if(nums.length>0)setProjTSD(p=>{const n=[...p];nums.forEach((v,i)=>{if(i<n.length)n[i]=v;});return n;});
  }

  // ── Derived ───────────────────────────────────────────────────────────────────
  const pN=parseFloat(planned)||0, sN=parseFloat(scheduled)||0;
  const extra=Math.max(0,sN-pN), dTSD=parseFloat(dailyTSD)||0;
  const bump=pN>0?extra/pN:0, newDailyTSD=dTSD>0?Math.round(dTSD*(1+bump)):0;

  const parsedWins=React.useMemo(()=>windows.map(w=>{const s=parseTimeInput(w.start),e=parseTimeInput(w.end);return s&&e?{sh:s.h,sm:s.m,eh:e.h,em:e.m}:null;}).filter(Boolean),[windows]);
  // Split: peak = first window only, laborWins = additional windows
  const peakWin  = parsedWins.length>0?parsedWins[0]:null;
  const laborWins= parsedWins.slice(1);
  const allWins  = parsedWins; // all windows for getZone / phased guidance
  const fws=parsedWins.length>0?Math.min(...parsedWins.map(w=>timeToDecimal(w.sh,w.sm))):null;
  const winDbg=parsedWins.map(w=>fmtTime(w.sh,w.sm)+"-"+fmtTime(w.eh,w.em)).join(", ");

  // Helper: is a slot inside the peak window?
  function inPeak(slot){
    if(!peakWin)return false;
    const t=timeToDecimal(slot.hour,slot.min);
    return t>=timeToDecimal(peakWin.sh,peakWin.sm)&&t<=timeToDecimal(peakWin.eh,peakWin.em);
  }
  // Helper: is a slot inside any extra labor window (windows[1+])?
  function inLabor(slot){
    if(laborWins.length===0)return false;
    const t=timeToDecimal(slot.hour,slot.min);
    return laborWins.some(w=>t>=timeToDecimal(w.sh,w.sm)&&t<=timeToDecimal(w.eh,w.em));
  }

  function getZone(slot){
    const t=timeToDecimal(slot.hour,slot.min);
    if(fws===null)return"none"; if(t<fws)return"before";
    if(parsedWins.some(w=>t>=timeToDecimal(w.sh,w.sm)&&t<=timeToDecimal(w.eh,w.em)))return"inside";
    return"carry";
  }
  function zc(z){if(z==="inside")return SB.green;if(z==="carry")return SB.gold;return SB.gray;}

  const targets=React.useMemo(()=>{
    const li=SLOTS.reduce((acc,s,i)=>projTSD[i]!==""?i:acc,-1);
    if(li<0)return SLOTS.map(()=>null);
    const eod=parseFloat(projTSD[li])||0, neod=eod*(1+bump);
    return SLOTS.map((slot,i)=>{
      const base=parseFloat(projTSD[i]);
      if(isNaN(base)||projTSD[i]==="")return null;
      const z=getZone(slot);
      if(z==="before"||z==="none")return Math.round(base);
      return eod===0?Math.round(base):Math.round(base*(neod/eod));
    });
  },[projTSD,parsedWins,bump]);

  const hasT=targets.some(t=>t!==null);
  const lastIdx=React.useMemo(()=>actTSD.reduce((acc,v,i)=>v!==""?i:acc,-1),[actTSD]);
  const curAct=lastIdx>=0?(parseFloat(actTSD[lastIdx])||0):null;
  const curTgt=lastIdx>=0?targets[lastIdx]:null;
  const gap=curAct!==null&&curTgt!==null?curAct-curTgt:null;
  const tsdRow=curAct!==null?getTSDRow(curAct):null;
  const justH=tsdRow?tsdRow.hours:0;
  const dir=(lastIdx>=0&&extra>0)?getDirection(extra,justH):null;
  const dirCfg=dir?DIR_CFG[dir.type]:null;
  const onPace=gap!==null?gap>=0:null;
  const totalCut=cutsLog.reduce((sum,e)=>sum+e.hrs,0);

  // ── Resolve Before/After Peak labels ──────────────────────────────────────────
  function resolveCheckInTime(label,wins){
    const lower=label.toLowerCase().replace(/\s+/g,"");
    const ps=wins.length>0?Math.min(...wins.map(w=>timeToDecimal(w.sh,w.sm))):null;
    const pe=wins.length>0?Math.max(...wins.map(w=>timeToDecimal(w.eh,w.em))):null;
    if((lower==="beforepeak"||lower==="prepeak")&&ps!==null){const t=ps-0.5;return{h:Math.floor(t),m:(t%1)*60};}

          :ce("div",null,
            ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
              ce("div",{style:{fontFamily:"sans-serif",fontSize:12,color:SB.gray}},"Pull latest setup"),
              ce("div",{style:{display:"flex",gap:8}},
                ce("button",{onClick:saveLive,style:{padding:"7px 14px",borderRadius:8,border:"none",background:SB.green,color:SB.white,fontFamily:"Georgia, serif",fontSize:12,fontWeight:700,cursor:"pointer"}},"💾 Save"),
                ce("button",{onClick:refresh,style:{padding:"7px 14px",borderRadius:8,border:"1px solid "+SB.green,background:"white",color:SB.green,fontFamily:"Georgia, serif",fontSize:12,fontWeight:700,cursor:"pointer"}},"⟳ Refresh"),
                ce("button",{onClick:clearActuals,style:{padding:"7px 14px",borderRadius:8,border:"1px solid #ddd",background:"white",color:SB.gray,fontFamily:"Georgia, serif",fontSize:12,cursor:"pointer"}},"Clear")
              )
            ),
            ce("div",{style:{background:SB.darkGreen,borderRadius:8,padding:"10px 14px",marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}},
              ce("div",{style:{fontFamily:"sans-serif",fontSize:13,color:SB.lightGreen}},
                ce("span",{style:{color:SB.white,fontWeight:700}},"+"+extra.toFixed(2)+" hrs")," scheduled",
                pN>0&&ce("span",null," · ",ce("span",{style:{color:SB.white,fontWeight:700}},(bump*100).toFixed(1)+"%")," bump")
              ),
              ce("div",{style:{fontFamily:"sans-serif",fontSize:12,color:SB.lightGreen}},DAYS[activeDay]+(dayLabel?" — "+dayLabel:""))
            ),
            managerNote.trim()&&ce("div",{style:{background:"#fffdf0",border:"1px solid #e8d98b",borderRadius:8,padding:"10px 14px",marginBottom:12,fontFamily:"sans-serif",fontSize:13,color:"#7a6400"}},
              "📋 ",managerNote
            ),
            // Pace + direction banner
            ce("div",{style:{background:onPace===null?SB.lightGray:onPace?"#e6f4ee":"#fde8e6",border:"2px solid "+(onPace===null?"#ccc":onPace?SB.green:SB.red),borderRadius:12,padding:"14px 16px",marginBottom:12}},
              ce("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:dir?8:0}},
                ce(Pip,{color:onPace===null?SB.gray:onPace?SB.green:SB.red,size:9}),
                ce("div",{style:{fontSize:14,fontWeight:700,color:onPace===null?SB.gray:onPace?SB.green:SB.red}},
                  onPace===null?"Enter actuals to track":onPace?"On Pace for Transactions":"Behind Pace on Transactions"
                ),
                gap!==null&&ce("div",{style:{fontSize:11,color:SB.gray,marginLeft:4}},"Actual "+curAct+" vs target "+curTgt+" ("+(gap>=0?"+":"")+gap+")")
              ),
              dir&&dirCfg&&ce("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}},
                ce(Pip,{color:dirCfg.pip,size:9}),
                ce("span",{style:{fontFamily:"sans-serif",fontSize:15,fontWeight:800,color:dirCfg.color}},
                  dir.type==="hold"?dirCfg.verb:dirCfg.verb+" "+dir.hrs.toFixed(2)+" "+dirCfg.suffix
                ),
                ce("span",{style:{fontFamily:"sans-serif",fontSize:12,color:SB.gray}},"— "+dirCfg.sub)
              )
            ),
            ce("div",{style:{display:"flex",gap:8,marginBottom:14}},
              ce(Pill,{label:"Day",value:dayLabel||DAYS[activeDay],color:SB.darkGreen}),
              ce(Pill,{label:"Extra Hrs",value:"+"+extra.toFixed(2),color:SB.gold}),
              ce(Pill,{label:"Bump %",value:(bump*100).toFixed(1)+"%",color:SB.green})
            ),
            // Actuals table
            ce("div",{style:{background:SB.white,border:"1px solid #ddd",borderRadius:12,overflow:"hidden",marginBottom:14}},
              ce("div",{style:{display:"grid",gridTemplateColumns:"80px 14px 70px 1fr 55px",background:SB.green}},
                ce(STH,{white:true},"Time"),ce(STH,{white:true}),ce(STH,{white:true},"Target"),ce(STH,{white:true},"Actual"),ce(STH,{white:true},"+/-")
              ),
              ce("div",{style:{maxHeight:400,overflowY:"auto"}},
                SLOTS.map((slot,i)=>{
                  const tgt=targets[i]; if(tgt===null)return null;
                  const z=getZone(slot),act=parseFloat(actTSD[i]),hA=actTSD[i]!==""&&!isNaN(act);
                  const diff=hA?act-tgt:null,isL=i===lastIdx;
                  const slotDec=timeToDecimal(slot.hour,slot.min);
                  const isCI=checkIns.filter(t=>t.trim()).some(label=>{const p=resolveCheckInTime(label,parsedWins);if(!p)return false;return Math.abs(timeToDecimal(p.h,p.m)-slotDec)<0.01;});
                  return ce("div",{key:i,style:{display:"grid",gridTemplateColumns:"80px 14px 70px 1fr 55px",borderBottom:"1px solid #f0f0f0",background:isL?SB.lightGreen:isCI?"#f0f8f4":z==="inside"?"#e8f5ee":SB.white,borderLeft:isCI?"3px solid "+SB.gold:"3px solid transparent"}},
                    ce("div",{style:{padding:"7px 8px",fontSize:10,color:isL?SB.darkGreen:isCI?SB.darkGreen:SB.gray,fontWeight:isCI?700:400,display:"flex",alignItems:"center"}},fmtTime(slot.hour,slot.min)),
                    ce("div",{style:{display:"flex",alignItems:"center",justifyContent:"center"}},z!=="before"&&z!=="none"&&ce("div",{style:{width:5,height:5,borderRadius:"50%",background:zc(z)}})),
                    ce("div",{style:{padding:"7px 8px",fontSize:15,fontWeight:700,color:zc(z),display:"flex",alignItems:"center"}},tgt),
                    ce("div",{style:{padding:"5px 6px",display:"flex",alignItems:"center"}},ce("input",{type:"number",inputMode:"numeric",placeholder:"enter",value:actTSD[i],onChange:e=>setActTSD(p=>{const n=[...p];n[i]=e.target.value;return n;}),style:iInp})),
                    ce("div",{style:{padding:"7px 6px",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",color:diff===null?"#ccc":diff>=0?SB.green:SB.red}},diff===null?"-":(diff>=0?"+":"")+diff)
                  );
                })
              )
            ),
            // Cut calc card
            lastIdx>=0&&(()=>{
              const phased=dir&&dir.type!=="hold"?getPhasedGuidance(dir.type,dir.hrs,SLOTS[lastIdx],parsedWins):null;
              const cardColor=dir?.type==="add"?SB.blue:dir?.type==="cut"?SB.red:SB.green;
              return ce("div",{style:{background:SB.white,border:"2px solid "+cardColor,borderRadius:12,padding:16,marginBottom:10}},
                ce("div",{style:{fontSize:9,color:SB.gray,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:10}},"Labor Direction — Calculation"),
                ce(CRow,{label:"Extra hours you scheduled",value:"+"+extra.toFixed(2)+" hrs",color:SB.gold}),
                ce(CRow,{label:"Transactions right now",value:curAct+" txns"}),
                ce(CRow,{label:"Extra hours those sales earn you",value:justH+" hrs",color:SB.green,sub:"This is your benchmark — not an instruction to add staff"}),
                ce("button",{onClick:()=>setMathOpen(o=>!o),style:{background:"none",border:"none",cursor:"pointer",fontFamily:"sans-serif",fontSize:12,color:SB.gray,padding:"8px 0 0",display:"flex",alignItems:"center",gap:4}},
                  ce("span",{style:{fontSize:9}},mathOpen?"▲":"▼"),mathOpen?"Hide breakdown":"Show breakdown"
                ),
                mathOpen&&ce("div",{style:{marginTop:8,paddingTop:8,borderTop:"1px solid #f0f0f0",fontFamily:"sans-serif",fontSize:12}},
                  ce(CRow,{label:"Scheduled bump",value:"+"+extra.toFixed(2)+" hrs",color:SB.gray}),
                  ce(CRow,{label:"TSD-justified hours",value:justH+" hrs",color:SB.green}),
                  ce(CRow,{label:dir?.type==="cut"?"Overscheduled by":dir?.type==="add"?"Underscheduled by":"Difference",value:(dir?.type==="cut"?"−":dir?.type==="add"?"+":"±")+(dir?.hrs||0).toFixed(2)+" hrs",color:cardColor})
                ),
                ce("div",{style:{borderTop:"1px solid #eee",marginTop:12,paddingTop:14}},
                  dir?.type==="hold"&&ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
                    ce("span",{style:{fontSize:12,color:SB.gray}},"Labor direction"),
                    ce("span",{style:{fontSize:20,fontWeight:700,color:SB.green}},"Keep all staff")
                  ),
                  phased&&ce("div",null,
                    ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
                      ce("div",{style:{background:phased.now===0?"#f7f7f7":dir.type==="cut"?"#fff0f0":"#f0f6fb",border:"1.5px solid "+(phased.now===0?"#ddd":cardColor),borderRadius:10,padding:"12px 10px",textAlign:"center"}},
                        ce("div",{style:{fontFamily:"sans-serif",fontSize:9,textTransform:"uppercase",letterSpacing:1,color:SB.gray,marginBottom:4}},phased.nowLabel),
                        ce("div",{style:{fontSize:phased.now===0?14:22,fontWeight:700,color:phased.now===0?SB.gray:cardColor}},phased.now===0?"Hold":phased.now.toFixed(2)+" hrs")
                      ),
                      phased.laterLabel&&ce("div",{style:{background:"#f7f7f7",border:"1.5px solid #ddd",borderRadius:10,padding:"12px 10px",textAlign:"center"}},
                        ce("div",{style:{fontFamily:"sans-serif",fontSize:9,textTransform:"uppercase",letterSpacing:1,color:SB.gray,marginBottom:4}},phased.laterLabel),
                        ce("div",{style:{fontSize:phased.later===0?14:22,fontWeight:700,color:"#888"}},phased.later===0?"None":phased.later.toFixed(2)+" hrs")
                      )
                    ),
                    ce("div",{style:{background:phased.caution?"#fdf8ee":"#f4f9f7",border:"1px solid "+(phased.caution?"#e8d98b":"#b7d9c8"),borderRadius:8,padding:"10px 12px",fontFamily:"sans-serif",fontSize:12,color:phased.caution?"#7a6400":SB.darkGreen,lineHeight:1.5}},
                      ce("span",{style:{marginRight:5}},phased.caution?"⚠️":"✅"),phased.note
                    )
                  )
                )
              );
            })(),
            ce("div",{style:{fontFamily:"sans-serif",fontSize:10,color:SB.gray,textAlign:"center",marginTop:4,marginBottom:16}},
              "±"+TOLERANCE+" hr tolerance · guidance adjusts based on time of day vs peak windows"
            ),
            // Cuts log
            (()=>{
              const totalAdded=cutsLog.filter(e=>e.type==="add").reduce((s,e)=>s+e.hrs,0);
              const netCut=totalCut-totalAdded;
              const onTrack=dir&&dir.type==="cut"?netCut>=dir.hrs-TOLERANCE:false;
              const remaining=dir?Math.max(0,dir.hrs-totalCut):0;
              return ce("div",null,
                ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
                  ce("div",{style:{fontFamily:"sans-serif",fontSize:11,letterSpacing:1,textTransform:"uppercase",color:SB.gray,fontWeight:600}},"Labor Adjustments Today"),
                  cutsLog.length>0&&ce("div",{style:{fontFamily:"sans-serif",fontSize:12,fontWeight:700,color:onTrack?SB.green:SB.red,background:onTrack?"#e6f4ee":"#fde8e6",border:"1px solid "+(onTrack?SB.green:SB.red),borderRadius:20,padding:"3px 10px"}},
                    onTrack?"✓ Back on track":netCut<0?"Added "+Math.abs(netCut).toFixed(2)+" net hrs":"Still need "+remaining.toFixed(2)+" more hrs"
                  )
                ),
                cutsLog.length>0&&ce("div",{style:{background:SB.darkGreen,borderRadius:8,padding:"10px 14px",marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center"}},
                  ce("div",null,
                    ce("div",{style:{fontFamily:"sans-serif",fontSize:11,color:SB.lightGreen}},cutsLog.filter(e=>e.type!=="add").length+" cut · "+cutsLog.filter(e=>e.type==="add").length+" added"),
                    ce("div",{style:{fontFamily:"sans-serif",fontSize:13,color:SB.lightGreen,marginTop:2}},"Net adjustment")
                  ),
                  ce("div",{style:{textAlign:"right"}},
                    ce("div",{style:{fontFamily:"Georgia,serif",fontSize:20,fontWeight:700,color:netCut>0?SB.white:netCut<0?"#6fcf97":SB.white}},(netCut>0?"−":"+")+Math.abs(netCut).toFixed(2)+" hrs"),
                    totalAdded>0&&ce("div",{style:{fontFamily:"sans-serif",fontSize:10,color:SB.lightGreen}})
                  )
                ),
                cutsLog.length>0&&ce("div",{style:{background:SB.white,border:"1px solid #d8e1dc",borderRadius:10,overflow:"hidden",marginBottom:10}},
                  cutsLog.map((e,i)=>ce("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"10px 14px",borderBottom:i<cutsLog.length-1?"1px solid #f0f0ea":"none",background:i===0?"#f9fdf9":SB.white}},
                    ce("div",null,
                      ce("div",{style:{fontFamily:"sans-serif",fontSize:13,fontWeight:700,color:e.type==="add"?SB.blue:SB.red}},(e.type==="add"?"＋":"−")+e.hrs.toFixed(2)+" hrs @ "+new Date(e.time).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})+(e.who?" · "+e.who:"")),
                      e.note&&ce("div",{style:{fontFamily:"sans-serif",fontSize:11,color:SB.gray,marginTop:2}},e.note)
                    ),
                    ce("button",{onClick:()=>removeCut(i),style:{background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:16,padding:"0 4px"}},"×")
                  ))
                ),
                ce("div",{style:{background:SB.white,border:"1px solid #d8e1dc",borderRadius:10,padding:"14px"}},
                  ce("div",{style:{marginBottom:12}},
                    ce("div",{style:{fontFamily:"sans-serif",fontSize:10,letterSpacing:1,textTransform:"uppercase",color:SB.gray,marginBottom:8}},"Record Adjustment"),
                    ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
                      ce("button",{onClick:()=>setCutEntry(x=>({...x,type:"cut"})),style:{
                        padding:"9px",borderRadius:8,border:"2px solid "+(cutEntry.type==="cut"?SB.red:"#ddd"),
                        background:cutEntry.type==="cut"?"#fff5f5":"white",
                        color:cutEntry.type==="cut"?SB.red:SB.gray,
                        fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,cursor:"pointer"
                      }},"✂️ Cut Hours"),
                      ce("button",{onClick:()=>setCutEntry(x=>({...x,type:"add"})),style:{
                        padding:"9px",borderRadius:8,border:"2px solid "+(cutEntry.type==="add"?SB.blue:"#ddd"),
                        background:cutEntry.type==="add"?"#f0f6fb":"white",
                        color:cutEntry.type==="add"?SB.blue:SB.gray,
                        fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,cursor:"pointer"
                      }},"➕ Add Hours")
                    )
                  ),
                  ce("div",{style:{display:"grid",gridTemplateColumns:"80px 1fr",gap:8,marginBottom:8}},
                    ce("div",null,
                      ce("div",{style:{fontFamily:"sans-serif",fontSize:10,color:SB.gray,marginBottom:4}},"Hours cut"),
                      ce("input",{type:"number",step:"0.25",placeholder:"e.g. 2",value:cutEntry.hrs,onChange:e=>setCutEntry(x=>({...x,hrs:e.target.value})),style:fieldInp})
                    ),
                    ce("div",null,
                      ce("div",{style:{fontFamily:"sans-serif",fontSize:10,color:SB.gray,marginBottom:4}},"SSV / Leader name"),
                      ce("input",{type:"text",placeholder:"SSV/Leader name",value:cutEntry.who,onChange:e=>setCutEntry(x=>({...x,who:e.target.value})),style:fieldInp})
                    )
                  ),
                  ce("input",{type:"text",placeholder:"Note (optional) — e.g. sent partner home at 11am",value:cutEntry.note,onChange:e=>setCutEntry(x=>({...x,note:e.target.value})),style:{...fieldInp,marginBottom:8}}),
                  ce("button",{onClick:logCut,disabled:!cutEntry.hrs||parseFloat(cutEntry.hrs)<=0,style:{width:"100%",padding:"11px",borderRadius:8,border:"none",background:cutEntry.hrs&&parseFloat(cutEntry.hrs)>0?SB.darkGreen:"#d8e1dc",color:cutEntry.hrs&&parseFloat(cutEntry.hrs)>0?SB.white:"#aaa",fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,cursor:"pointer"}},cutEntry.type==="add"?"Log Added Hours":"Log Cut")
                )
              );
            })()
          )
      ),

      // ════════ WEEK SUMMARY ════════
      view==="week"&&(()=>{
        const weekData=DAYS.map((d,i)=>{
          const s=lsGet(dayKey(d,"setup"))||defaultSetup();
          const l=lsGet(dayKey(d,"live"))||defaultLive();
          const pN=parseFloat(s.planned)||0,sN=parseFloat(s.scheduled)||0;
          const extra=Math.max(0,sN-pN);
          const totalCut=(l.cutsLog||[]).reduce((sum,e)=>sum+e.hrs,0);
          const lastActIdx=(l.actTSD||[]).reduce((acc,v,i)=>v!==""?i:acc,-1);
          const finalTxn=lastActIdx>=0?parseFloat((l.actTSD||[])[lastActIdx])||0:null;
          return{day:d,dayIdx:i,label:s.dayLabel||d,published:s.published,planned:pN,scheduled:sN,extra,totalCut,cutsLog:l.cutsLog||[],managerNote:s.managerNote||"",finalTxn};
        });
        const anyData=weekData.some(d=>d.published);
        const totalCutWeek=weekData.reduce((sum,d)=>sum+d.totalCut,0);
        const totalExtraWeek=weekData.reduce((sum,d)=>sum+d.extra,0);

        return ce("div",null,
          ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
            ce("div",{style:{fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,color:SB.darkGreen}},"Weekly Summary"),
            ce("div",{style:{display:"flex",gap:8}},
              anyData&&ce("button",{onClick:()=>window.print(),style:{padding:"9px 16px",borderRadius:8,border:"none",background:SB.green,color:SB.white,fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,cursor:"pointer"}},"🖨 Print Summary"),
              ce("button",{onClick:resetWeek,style:{padding:"9px 16px",borderRadius:8,border:"2px solid "+SB.red,background:"transparent",color:SB.red,fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,cursor:"pointer"}},"🔄 Reset Week")
            )
          ),
          !anyData
            ?ce("div",{style:{textAlign:"center",padding:"40px 20px",color:SB.gray,fontSize:13,background:SB.white,borderRadius:12,border:"1px solid #ddd"}},"No published days yet this week. Set up and publish each day to see the summary here.")
            :ce("div",null,
              // Week totals strip
              ce("div",{style:{display:"flex",gap:8,marginBottom:16}},
                ce(Pill,{label:"Total Extra Hrs Scheduled",value:"+"+totalExtraWeek.toFixed(2),color:SB.gold}),
                ce(Pill,{label:"Total Hours Cut",value:"−"+totalCutWeek.toFixed(2),color:SB.red})
              ),
              // Day-by-day cards
              weekData.map((d,i)=>ce("div",{key:i,style:{background:SB.white,border:"1px solid #d8e1dc",borderRadius:12,marginBottom:12,overflow:"hidden"}},
                // Day header
                ce("div",{style:{background:d.published?SB.darkGreen:"#888",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
                  ce("div",{style:{color:SB.white,fontWeight:700,fontSize:15}},d.day+(d.label&&d.label!==d.day?" — "+d.label:"")),
                  ce("div",{style:{fontFamily:"sans-serif",fontSize:11,color:SB.lightGreen}},d.published?"Published":"Not set up")
                ),
                d.published&&ce("div",{style:{padding:"12px 16px"}},
                  // Stats row
                  ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:d.cutsLog.length>0||d.managerNote?12:0}},
                    ce("div",{style:{textAlign:"center"}},
                      ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.gray,textTransform:"uppercase",letterSpacing:1,marginBottom:3}},"Extra Scheduled"),
                      ce("div",{style:{fontFamily:"Georgia,serif",fontSize:16,fontWeight:700,color:SB.gold}},"+"+d.extra.toFixed(2)+" hrs")
                    ),
                    ce("div",{style:{textAlign:"center"}},
                      ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.gray,textTransform:"uppercase",letterSpacing:1,marginBottom:3}},"Total Cut"),
                      ce("div",{style:{fontFamily:"Georgia,serif",fontSize:16,fontWeight:700,color:d.totalCut>0?SB.red:SB.gray}},d.totalCut>0?"−"+d.totalCut.toFixed(2)+" hrs":"None")
                    ),
                    ce("div",{style:{textAlign:"center"}},
                      ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.gray,textTransform:"uppercase",letterSpacing:1,marginBottom:3}},"Final TXN"),
                      ce("div",{style:{fontFamily:"Georgia,serif",fontSize:16,fontWeight:700,color:SB.darkGreen}},d.finalTxn!==null?d.finalTxn:"—")
                    )
                  ),
                  // Manager note
                  d.managerNote&&ce("div",{style:{background:"#fffdf0",border:"1px solid #e8d98b",borderRadius:6,padding:"8px 10px",marginBottom:d.cutsLog.length>0?10:0,fontFamily:"sans-serif",fontSize:12,color:"#7a6400"}},"📋 "+d.managerNote),
                  // Cuts log
                  d.cutsLog.length>0&&ce("div",null,
                    ce("div",{style:{fontFamily:"sans-serif",fontSize:10,textTransform:"uppercase",letterSpacing:1,color:SB.gray,marginBottom:6}},"Cuts made"),
                    d.cutsLog.map((c,j)=>ce("div",{key:j,style:{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:j<d.cutsLog.length-1?"1px solid #f0f0ea":"none"}},
                      ce("span",{style:{fontFamily:"sans-serif",fontSize:12,color:SB.darkGreen,fontWeight:600}},"−"+c.hrs.toFixed(2)+" hrs @ "+new Date(c.time).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})+(c.who?" · "+c.who:"")),
                      c.note&&ce("span",{style:{fontFamily:"sans-serif",fontSize:11,color:SB.gray}},c.note)
                    ))
                  )
                ),
                !d.published&&ce("div",{style:{padding:"12px 16px",fontFamily:"sans-serif",fontSize:12,color:SB.gray}},"No data — tap ",ce("b",null,d.day)," above to set it up.")
              ))
            )
        );
      })()
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
