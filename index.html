                const z=zone(slot);const act=parseFloat(actTSD[i]);const hA=actTSD[i]!==""&&!isNaN(act);
                const diff=hA?act-tgt:null;const isL=i===lastIdx;
                return el("div",{key:i,style:{display:"grid",gridTemplateColumns:"80px 14px 70px 1fr 55px",borderBottom:"1px solid #f0f0f0",background:isL?SB.lightGreen:z==="inside"?"#e8f5ee":SB.white}},
                  el("div",{style:{padding:"7px 8px",fontSize:10,color:isL?SB.darkGreen:SB.gray,display:"flex",alignItems:"center"}},fmtTime(slot.hour,slot.min)),
                  el("div",{style:{display:"flex",alignItems:"center",justifyContent:"center"}},z!=="before"&&z!=="none"&&el("div",{style:{width:5,height:5,borderRadius:"50%",background:zc(z)}})),
                  el("div",{style:{padding:"7px 8px",fontSize:15,fontWeight:700,color:zc(z),display:"flex",alignItems:"center"}},tgt),
                  el("div",{style:{padding:"5px 6px",display:"flex",alignItems:"center"}},el("input",{type:"number",inputMode:"numeric",placeholder:"enter",value:actTSD[i],onChange:e=>updAct(i,e.target.value),style:iInp})),
                  el("div",{style:{padding:"7px 6px",fontSize:13,fontWeight:700,display:"flex",alignItems:"center",color:diff===null?"#ccc":diff>=0?SB.green:"#c0392b"}},diff===null?"-":(diff>=0?"+":"")+diff)
                );
              })
            )
          ),
          lastIdx>=0&&el("div",{style:{background:SB.white,border:"2px solid "+(toCut>0?"#c0392b":SB.green),borderRadius:12,padding:16}},
            el("div",{style:{fontSize:9,color:SB.gray,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:10}},"Cut Calculation"),
            el(CRow,{label:"Extra hours scheduled",value:"+"+extra.toFixed(2)+" hrs",color:SB.gold}),
            el(CRow,{label:"TSD at "+fmtTime(SLOTS[lastIdx].hour,SLOTS[lastIdx].min),value:curAct+" transactions"}),
            el(CRow,{label:"Hours justified (TSD chart)",value:(tsdRow?tsdRow.label:"-")+" hrs = "+justH+" hrs",color:SB.green}),
            el("div",{style:{borderTop:"1px solid #eee",marginTop:10,paddingTop:12,display:"flex",justifyContent:"space-between",alignItems:"center"}},
              el("span",{style:{fontSize:12,color:SB.gray}},"Hours to cut"),
              el("span",{style:{fontSize:26,fontWeight:700,color:toCut>0?"#c0392b":SB.green}},toCut>0?toCut.toFixed(2)+" hrs":"Keep all staff")
            )
          )
        )
      )
    )
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
