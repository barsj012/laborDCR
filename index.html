<script type="text/babel">

// ── Brand ─────────────────────────────────────────────────────────────────────
const SB = {
  green:"#00704A", darkGreen:"#1E3932", lightGreen:"#D4E9E2",
  gold:"#CBA258", white:"#FFFFFF", cream:"#F2EFE8",
  gray:"#747474", lightGray:"#EDEBE4", black:"#1E1E1E",
  red:"#c0392b", blue:"#1a6091", purple:"#9b59b6", purpleLight:"#ede8f5"
};

// ── Constants ─────────────────────────────────────────────────────────────────
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const TOLERANCE = 0.5;
const TSD_CHART = [
  {min:0,   max:24,       hours:0},   {min:24,  max:39,  hours:1.5},
  {min:39,  max:54,       hours:2.5}, {min:54,  max:68,  hours:3.5},
  {min:68,  max:83,       hours:4.5}, {min:83,  max:98,  hours:5.5},
  {min:98,  max:124,      hours:6.5}, {min:124, max:154, hours:7.5},
  {min:154, max:Infinity, hours:8}
];
function getTSDRow(t){ return TSD_CHART.find(r=>t>=r.min&&t<r.max)||TSD_CHART[TSD_CHART.length-1]; }

// ── Time helpers ──────────────────────────────────────────────────────────────
function makeSlots(){
  const s=[];
  for(let h=5;h<20;h++){s.push({hour:h,min:0});s.push({hour:h,min:30});}
  s.push({hour:20,min:0}); return s;
}
const SLOTS = makeSlots();
function fmtTime(h,m){ const a=h<12?"AM":"PM",h2=h===0?12:h>12?h-12:h; return h2+":"+(m===0?"00":"30")+" "+a; }
function dec(h,m){ return h+m/60; }
function parseT(str){
  if(!str)return null;
  str=str.trim().toLowerCase().replace(/\s+/g,"");
  let a=null;
  if(str.endsWith("am")||str.endsWith("a")){a="am";str=str.replace(/(am|a)$/,"");}
  else if(str.endsWith("pm")||str.endsWith("p")){a="pm";str=str.replace(/(pm|p)$/,"");}
  const p=str.split(/[:.]/); let h=parseInt(p[0]); const m=p[1]?parseInt(p[1]):0;
  if(isNaN(h))return null;
  if(a==="pm"&&h!==12)h+=12; if(a==="am"&&h===12)h=0; if(a===null&&h<5)h+=12;
  return{h,m};
}

// ── Direction logic ───────────────────────────────────────────────────────────
function getDir(extra,justH){
  const d=extra-justH;
  if(d>TOLERANCE) return{type:"cut",hrs:d};
  if(d<-TOLERANCE)return{type:"add",hrs:Math.abs(d)};
  return{type:"hold",hrs:0};
}
const DIR={
  cut: {color:SB.red,  bg:"#fff5f5",border:SB.red,  pip:SB.red,  verb:"Cut",          sfx:"hrs",sub:"transactions don't justify your current labor"},
  hold:{color:SB.green,bg:"#f4f9f7",border:SB.green,pip:SB.green,verb:"Keep all staff",sfx:"",  sub:"labor and sales are in balance"},
  add: {color:SB.blue, bg:"#f0f6fb",border:SB.blue, pip:SB.blue, verb:"Add up to",     sfx:"hrs",sub:"your volume is outpacing your staffing"},
  holdBehind:{color:SB.gray,bg:SB.lightGray,border:"#ccc",pip:SB.gray,verb:"Hold current staffing",sfx:"",sub:"behind on transactions — don't add labor until sales catch up"},
};

// ── Phased guidance ───────────────────────────────────────────────────────────
function phaseGuide(dirType,totalHrs,slot,wins){
  if(!slot)return null;
  const now=dec(slot.hour,slot.min);
  const ps=wins.length>0?Math.min(...wins.map(w=>dec(w.sh,w.sm))):null;
  const pe=wins.length>0?Math.max(...wins.map(w=>dec(w.eh,w.em))):null;
  let phase="no-windows";
  if(ps!==null){
    if(now<ps)phase="pre-peak";
    else if(now<=pe)phase="in-peak";
    else if(now<=pe+1)phase="post-peak";
    else phase="late-day";
  }
  const peStr=pe?fmtTime(Math.floor(pe),(pe%1)*60):null;
  const rnd=v=>Math.round(v*2)/2;
  const h=totalHrs;
  if(dirType==="cut"){
    if(phase==="pre-peak"){const n=rnd(h*.25),l=rnd(h-n);return{now:n,later:l,nl:"Trim now",ll:"Cut more after peak",note:`You're before peak — don't over-cut. Release ${n.toFixed(2)} hrs from early/slow positions. If trend holds past ${peStr}, cut ${l.toFixed(2)} more.`,warn:true};}
    if(phase==="in-peak"){return{now:0,later:h,nl:"Hold cuts",ll:"Cut after peak if trend holds",note:`You're in your peak window — hold all cuts. Reassess at ${peStr}. If trend continues, cut ${h.toFixed(2)} hrs from afternoon shifts.`,warn:true};}
    if(phase==="post-peak"){const n=rnd(h*.5),l=rnd(h-n);return{now:n,later:l,nl:"Cut now",ll:"Cut more if flat",note:`Just past peak. Cut ${n.toFixed(2)} hrs now. If volume stays flat for an hour, cut ${l.toFixed(2)} more.`,warn:false};}
    if(phase==="late-day"){const n=rnd(h*.65),l=rnd(h-n);return{now:n,later:l,nl:"Cut now",ll:"Cut rest from close",note:`Past peak — safe to cut. Release ${n.toFixed(2)} hrs now, cut ${l.toFixed(2)} from closing if no late rush.`,warn:false};}
    const n=rnd(h*.5),l=rnd(h-n);return{now:n,later:l,nl:"Cut now",ll:"Cut more if trend holds",note:`Cut ${n.toFixed(2)} hrs now. If trend continues, cut ${l.toFixed(2)} more. Add peak windows in Setup for smarter timing.`,warn:false};
  }
  if(dirType==="add"){
    if(phase==="pre-peak"||phase==="in-peak")return{now:h,later:0,nl:"Add now",ll:"",note:`Volume justifies +${h.toFixed(2)} hrs — heading into peak. Add labor now.`,warn:false};
    const n=rnd(h*.5),l=rnd(h-n);return{now:n,later:l,nl:"Add now",ll:"Add more if trend builds",note:`Room to add ${h.toFixed(2)} hrs. Bring in ${n.toFixed(2)} now; add ${l.toFixed(2)} more if volume keeps building.`,warn:false};
  }
  return null;
}

// ── Storage ───────────────────────────────────────────────────────────────────
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){return false;}}
function dayKey(day,type){return `laborDCR_${type}_${day}_v3`;}
function fbPath(k){return "laborDCR/"+k.replace(/[.#$[\]]/g,"_");}
function syncSet(k,v){lsSet(k,v);if(window._fbSet)window._fbSet(fbPath(k),v).catch(()=>{});}
async function syncGet(k){
  if(window._fbGet){try{const v=await window._fbGet(fbPath(k));if(v!==null){lsSet(k,v);return v;}}catch(e){}}
  return lsGet(k);
}
function syncListen(k,cb){
  if(!window._fbListen)return()=>{};
  return window._fbListen(fbPath(k),val=>{if(val!==null){lsSet(k,val);cb(val);}});
}

// ── Defaults ──────────────────────────────────────────────────────────────────
const defSetup=()=>({planned:"",scheduled:"",dayLabel:"",dailyTSD:"",managerNote:"",pastedDCR:"",
  windows:[{start:"7a",end:"10a"}],projTSD:Array(SLOTS.length).fill(""),
  checkIns:["Before Peak","After Peak","2:00 PM","4:00 PM"],published:false});
const defLive=()=>({actTSD:Array(SLOTS.length).fill(""),cutsLog:[]});
const defWeek=()=>({weekOf:"",projPlanned:"",projScheduled:"",projTSD:"",weekNote:""});

const ce=React.createElement;

// ── Small UI components ───────────────────────────────────────────────────────
function Lbl({children,nb}){return ce("div",{style:{fontSize:9,color:SB.darkGreen,textTransform:"uppercase",letterSpacing:"0.18em",fontWeight:700,marginBottom:nb?0:7}},children);}
function ColHd({children,wh,gr}){return ce("div",{style:{fontSize:9,color:wh?SB.white:gr?SB.darkGreen:SB.gray,textTransform:"uppercase",letterSpacing:"0.1em",padding:"8px 10px",fontWeight:700}},children);}
function Pill({label,value,color}){return ce("div",{style:{background:SB.white,border:"1px solid #ddd",borderRadius:8,padding:"7px 10px",flex:1,textAlign:"center",minWidth:80}},
  ce("div",{style:{fontSize:8,color:SB.gray,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}},label),
  ce("div",{style:{fontSize:13,fontWeight:700,color}},value));}
function Stat({label,value}){return ce("div",null,
  ce("div",{style:{fontSize:8,color:SB.lightGreen,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}},label),
  ce("div",{style:{fontSize:13,fontWeight:700,color:SB.white}},value));}
function CRow({label,value,color,sub}){return ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"6px 0",borderBottom:"1px solid #f0f0f0"}},
  ce("div",null,ce("span",{style:{fontSize:11,color:SB.gray}},label),sub&&ce("div",{style:{fontSize:9,color:"#aaa",marginTop:2,fontStyle:"italic",fontFamily:"sans-serif"}},sub)),
  ce("span",{style:{fontSize:12,fontWeight:600,color:color||SB.black,marginLeft:8,flexShrink:0}},value));}
function Pip({color,size=8}){return ce("span",{style:{display:"inline-block",width:size,height:size,borderRadius:"50%",background:color,flexShrink:0,verticalAlign:"middle",marginRight:6,transform:"translateY(-1px)"}});}

const INP={display:"block",width:"100%",boxSizing:"border-box",background:SB.white,border:"1px solid #ccc",borderRadius:8,color:SB.black,fontFamily:"Georgia,serif",fontSize:15,padding:"10px 12px",outline:"none"};
const IINP={display:"block",width:"100%",boxSizing:"border-box",background:"transparent",border:"none",borderBottom:"1px solid #ccc",color:SB.black,fontFamily:"Georgia,serif",fontSize:14,padding:"3px 4px",outline:"none"};
const FINP={width:"100%",padding:"9px 10px",borderRadius:6,border:"1px solid #d8e1dc",fontFamily:"sans-serif",fontSize:14,color:SB.darkGreen,background:"#fafaf7",outline:"none",boxSizing:"border-box"};

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const todayIdx=(new Date().getDay()+6)%7;
  const [activeDay, setActiveDay] = React.useState(todayIdx);
  const [view,      setView]      = React.useState("manager");
  const [weekTab,   setWeekTab]   = React.useState("summary");
  const [saveMsg,   setSaveMsg]   = React.useState("");
  const [mathOpen,  setMathOpen]  = React.useState(false);
  const [loaded,    setLoaded]    = React.useState(false);
  const unsubRef = React.useRef(null);

  // Setup state
  const [planned,     setPlanned]     = React.useState("");
  const [scheduled,   setScheduled]   = React.useState("");
  const [dayLabel,    setDayLabel]    = React.useState("");
  const [dailyTSD,    setDailyTSD]    = React.useState("");
  const [managerNote, setManagerNote] = React.useState("");
  const [pastedDCR,   setPastedDCR]   = React.useState("");
  const [windows,     setWindows]     = React.useState([{start:"7a",end:"10a"}]);
  const [projTSD,     setProjTSD]     = React.useState(Array(SLOTS.length).fill(""));
  const [checkIns,    setCheckIns]    = React.useState(["Before Peak","After Peak","2:00 PM","4:00 PM"]);
  const [published,   setPublished]   = React.useState(false);

  // Live state
  const [actTSD,   setActTSD]   = React.useState(Array(SLOTS.length).fill(""));
  const [cutsLog,  setCutsLog]  = React.useState([]);
  const [cutEntry, setCutEntry] = React.useState({hrs:"",who:"",note:"",type:"cut"});

  // Week setup state
  const [weekSetup, setWeekSetup] = React.useState(defWeek());

  // ── Load day ────────────────────────────────────────────────────────────────
  async function loadDay(idx){
    const day=DAYS[idx];
    const s=(await syncGet(dayKey(day,"setup")))||defSetup();
    setPlanned(s.planned||"");       setScheduled(s.scheduled||"");
    setDayLabel(s.dayLabel||"");     setDailyTSD(s.dailyTSD||"");
    setManagerNote(s.managerNote||""); setPastedDCR(s.pastedDCR||"");
    setWindows(s.windows||[{start:"7a",end:"10a"}]);
    setProjTSD(s.projTSD||Array(SLOTS.length).fill(""));
    setCheckIns(s.checkIns||["Before Peak","After Peak","2:00 PM","4:00 PM"]);
    setPublished(!!s.published);
    const l=(await syncGet(dayKey(day,"live")))||defLive();
    setActTSD(l.actTSD||Array(SLOTS.length).fill(""));
    setCutsLog(l.cutsLog||[]);
    setCutEntry({hrs:"",who:"",note:"",type:"cut"});
    setMathOpen(false);
    setLoaded(true);
    if(unsubRef.current){try{unsubRef.current();}catch(e){}  unsubRef.current=null;}
    unsubRef.current=syncListen(dayKey(day,"live"),val=>{
      if(!val)return;
      setActTSD(val.actTSD||Array(SLOTS.length).fill(""));
      setCutsLog(val.cutsLog||[]);
    });
  }

  React.useEffect(()=>{
    loadDay(todayIdx);
    const ws=lsGet("laborDCR_weekSetup_v3");
    if(ws)setWeekSetup(ws);
  },[]);

  // Auto-save live (guarded by loaded flag)
  React.useEffect(()=>{
    if(!loaded)return;
    syncSet(dayKey(DAYS[activeDay],"live"),{actTSD,cutsLog});
  },[actTSD,cutsLog,activeDay,loaded]);

  function switchDay(idx){setLoaded(false);setActiveDay(idx);loadDay(idx);}

  // ── Save functions ──────────────────────────────────────────────────────────
  function saveSetup(andPublish){
    const data={planned,scheduled,dayLabel,dailyTSD,managerNote,pastedDCR,windows,projTSD,checkIns,published:andPublish||published};
    syncSet(dayKey(DAYS[activeDay],"setup"),data);
    if(andPublish){setPublished(true);setView("screenshot");}
    flash("Saved ✓");
  }
  function saveLive(){syncSet(dayKey(DAYS[activeDay],"live"),{actTSD,cutsLog});flash("Live data saved ✓");}
  function saveWeekSetup(){syncSet("laborDCR_weekSetup_v3",weekSetup);flash("Week setup saved ✓");}
  function refresh(){loadDay(activeDay);flash("Refreshed ✓");}
  function flash(msg){setSaveMsg(msg);setTimeout(()=>setSaveMsg(""),2500);}

  function clearActuals(){
    if(!window.confirm("Clear actuals for this day?"))return;
    setActTSD(Array(SLOTS.length).fill("")); setCutsLog([]);
  }
  function resetDay(){
    if(!window.confirm(`Reset ALL data for ${DAYS[activeDay]}?`))return;
    const day=DAYS[activeDay];
    localStorage.removeItem(dayKey(day,"setup")); localStorage.removeItem(dayKey(day,"live"));
    if(window._fbSet){window._fbSet(fbPath(dayKey(day,"setup")),null);window._fbSet(fbPath(dayKey(day,"live")),null);}
    const d=defSetup(); const l=defLive();
    setPlanned(""); setScheduled(""); setDayLabel(""); setDailyTSD(""); setManagerNote(""); setPastedDCR("");
    setWindows([{start:"7a",end:"10a"}]); setProjTSD(Array(SLOTS.length).fill(""));
    setCheckIns(["Before Peak","After Peak","2:00 PM","4:00 PM"]); setPublished(false);
    setActTSD(Array(SLOTS.length).fill("")); setCutsLog([]); setCutEntry({hrs:"",who:"",note:"",type:"cut"});
    flash(DAYS[activeDay]+" reset ✓");
  }
  function resetWeek(){
    if(!window.confirm("Reset ALL data for the entire week?"))return;
    DAYS.forEach(d=>{
      localStorage.removeItem(dayKey(d,"setup")); localStorage.removeItem(dayKey(d,"live"));
      if(window._fbSet){window._fbSet(fbPath(dayKey(d,"setup")),null);window._fbSet(fbPath(dayKey(d,"live")),null);}
    });
    lsSet("laborDCR_weekSetup_v3",defWeek());
    if(window._fbSet)window._fbSet(fbPath("laborDCR_weekSetup_v3"),null);
    setWeekSetup(defWeek());
    loadDay(activeDay); flash("Week reset ✓");
  }

  // ── Cuts log ────────────────────────────────────────────────────────────────
  function logCut(){
    const n=parseFloat(cutEntry.hrs);
    if(isNaN(n)||n<=0)return;
    const entry={time:Date.now(),hrs:n,who:cutEntry.who.trim(),note:cutEntry.note.trim(),type:cutEntry.type||"cut"};
    setCutsLog(p=>[entry,...p]);
    setCutEntry({hrs:"",who:"",note:"",type:cutEntry.type});
  }
  function removeCut(i){setCutsLog(p=>p.filter((_,j)=>j!==i));}

  // ── Paste handler ────────────────────────────────────────────────────────────
  function handlePaste(e){
    const raw=e.target.value; setPastedDCR(raw);
    const nums=raw.replace(/running total/i,"").trim().split(/[\t,\s]+/).map(v=>v.trim()).filter(v=>v&&!isNaN(v));
    if(nums.length>0)setProjTSD(p=>{const n=[...p];nums.forEach((v,i)=>{if(i<n.length)n[i]=v;});return n;});
  }

  // ── Derived ──────────────────────────────────────────────────────────────────
  const pN=parseFloat(planned)||0, sN=parseFloat(scheduled)||0;
  const extra=Math.max(0,sN-pN), bump=pN>0?extra/pN:0;
  const newDailyTSD=(parseFloat(dailyTSD)||0)>0?Math.round((parseFloat(dailyTSD)||0)*(1+bump)):0;

  const parsedWins=React.useMemo(()=>
    windows.map(w=>{const s=parseT(w.start),e=parseT(w.end);return s&&e?{sh:s.h,sm:s.m,eh:e.h,em:e.m}:null;}).filter(Boolean)
  ,[windows]);
  const peakWin=parsedWins[0]||null;
  const laborWins=parsedWins.slice(1);
  const fwsDec=parsedWins.length>0?Math.min(...parsedWins.map(w=>dec(w.sh,w.sm))):null;
  const winDbg=parsedWins.map(w=>fmtTime(w.sh,w.sm)+"-"+fmtTime(w.eh,w.em)).join(", ");

  function getZone(slot){
    const t=dec(slot.hour,slot.min);
    if(fwsDec===null)return"none"; if(t<fwsDec)return"before";
    if(parsedWins.some(w=>t>=dec(w.sh,w.sm)&&t<=dec(w.eh,w.em)))return"inside";
    return"carry";
  }
  function zColor(z){return z==="inside"?SB.green:z==="carry"?SB.gold:SB.gray;}
  function inPeak(slot){if(!peakWin)return false;const t=dec(slot.hour,slot.min);return t>=dec(peakWin.sh,peakWin.sm)&&t<=dec(peakWin.eh,peakWin.em);}
  function inLabor(slot){const t=dec(slot.hour,slot.min);return laborWins.some(w=>t>=dec(w.sh,w.sm)&&t<=dec(w.eh,w.em));}

  const targets=React.useMemo(()=>{
    const li=SLOTS.reduce((a,s,i)=>projTSD[i]!==""?i:a,-1);
    if(li<0)return SLOTS.map(()=>null);
    const eod=parseFloat(projTSD[li])||0, neod=eod*(1+bump);
    return SLOTS.map((slot,i)=>{
      const base=parseFloat(projTSD[i]);
      if(isNaN(base)||projTSD[i]==="")return null;
      const z=getZone(slot);
      if(z==="before"||z==="none")return Math.round(base);
      return eod===0?Math.round(base):Math.round(base*(neod/eod));
    });
  },[projTSD,parsedWins,bump]);

  const hasT=targets.some(t=>t!==null);
  const lastIdx=React.useMemo(()=>actTSD.reduce((a,v,i)=>v!==""?i:a,-1),[actTSD]);
  const curAct=lastIdx>=0?(parseFloat(actTSD[lastIdx])||0):null;
  const curTgt=lastIdx>=0?targets[lastIdx]:null;
  const gap=curAct!==null&&curTgt!==null?curAct-curTgt:null;
  const tsdRow=curAct!==null?getTSDRow(curAct):null;
  const justH=tsdRow?tsdRow.hours:0;
  const dir=(lastIdx>=0&&extra>0)?(()=>{
    const d=getDir(extra,justH);
    // If behind on transactions, never recommend adding labor
    if(d.type==="add"&&onPace===false){
      return{type:"hold",hrs:0,behindPaceOverride:true};
    }
    return d;
  })():null;
  const dirCfg=dir?(dir.behindPaceOverride?DIR.holdBehind:DIR[dir.type]):null;
  const onPace=gap!==null?gap>=0:null;

  // Cuts & adds
  const totalCut=cutsLog.filter(e=>e.type!=="add").reduce((s,e)=>s+e.hrs,0);
  const totalAdded=cutsLog.filter(e=>e.type==="add").reduce((s,e)=>s+e.hrs,0);
  const netCut=totalCut-totalAdded;

  // Resolve Before/After Peak
  function resolveCI(label,wins){
    const l=label.toLowerCase().replace(/\s+/g,"");
    const ps=wins.length>0?Math.min(...wins.map(w=>dec(w.sh,w.sm))):null;
    const pe=wins.length>0?Math.max(...wins.map(w=>dec(w.eh,w.em))):null;
    if((l==="beforepeak"||l==="prepeak")&&ps!==null){const t=ps-0.5;return{h:Math.floor(t),m:(t%1)*60};}
    if((l==="afterpeak"||l==="postpeak")&&pe!==null){const t=pe+0.5;return{h:Math.floor(t),m:(t%1)*60};}

            lastIdx>=0&&(()=>{
              // If we don't cut: actual extra run = scheduled extra - net cuts so far
              const noCutActual = extra - netCut;
              // If we don't cut: are we over or under justified?
              const noCutVariance = noCutActual - justH;
              const noCutPct = justH > 0 ? (noCutVariance / justH) * 100 : 0;
              // How many hrs would make us exactly even with justified
              const hrsToBreakEven = Math.abs(noCutVariance);
              const needsToCut = noCutVariance > TOLERANCE;

      // ══════════════════════════════════════════

      view==="week"&&(()=>{
        // Week-level data
        const weekData=DAYS.map((d,i)=>{
          const s=lsGet(dayKey(d,"setup"))||defSetup();
          const l=lsGet(dayKey(d,"live"))||defLive();
          const pl=parseFloat(s.planned)||0, sc=parseFloat(s.scheduled)||0;
          const ex=Math.max(0,sc-pl);
          const cuts=(l.cutsLog||[]).filter(e=>e.type!=="add").reduce((s,e)=>s+e.hrs,0);
          const adds=(l.cutsLog||[]).filter(e=>e.type==="add").reduce((s,e)=>s+e.hrs,0);
          const net=cuts-adds;
          const lai=(l.actTSD||[]).reduce((a,v,i)=>v!==""?i:a,-1);
          const ftxn=lai>=0?parseFloat((l.actTSD||[])[lai])||0:null;
          const earnedHrs=ftxn!==null?getTSDRow(ftxn).hours:null;
          const actualExtra=ex-net;
          return{day:d,idx:i,label:s.dayLabel||d,pub:s.published,planned:pl,scheduled:sc,extra:ex,cuts,adds,net,actualExtra,earnedHrs,cutsLog:l.cutsLog||[],note:s.managerNote||"",ftxn};
        });
        const anyData=weekData.some(d=>d.pub);
        const totalExWk=weekData.reduce((s,d)=>s+d.extra,0);
        const totalCutWk=weekData.reduce((s,d)=>s+d.cuts,0);
        const totalAddWk=weekData.reduce((s,d)=>s+d.adds,0);
        const netWk=totalCutWk-totalAddWk;
        // Estimate earned hours automatically: planned hrs per day + TSD-justified extra
        // This mirrors Starbucks' formula closely without needing manual input
        const daysWithData=weekData.filter(d=>d.pub&&d.earnedHrs!==null);
        const daysRemaining=weekData.filter(d=>d.pub&&d.earnedHrs===null);
        // Estimated earned per day = planned hours + TSD-justified extra (from actuals)
        const estimatedEarnedWk=daysWithData.reduce((s,d)=>s+(parseFloat(d.planned)||0)+(d.earnedHrs||0),0);
        const hasEarnedData=daysWithData.length>0;
        // Actual total hours run so far = planned + actual extra run (scheduled ± cuts/adds)
        const totalActualHrsWk=daysWithData.reduce((s,d)=>s+(parseFloat(d.planned)||0)+(d.actualExtra||0),0);
        // Variance = actual hrs run vs estimated earned
        const laborVariance=totalActualHrsWk-estimatedEarnedWk;
        // Remaining: days without actuals still have their full scheduled extra
        const remainingScheduledExtra=daysRemaining.reduce((s,d)=>s+d.extra,0);
        const remainingPlanned=daysRemaining.reduce((s,d)=>s+d.planned,0);
        // Project remaining earned using avg earned-per-day from completed days
        const avgEarnedPerDay=daysWithData.length>0?estimatedEarnedWk/daysWithData.length:0;
        const projectedRemainingEarned=avgEarnedPerDay*daysRemaining.length;
        const projectedTotalEarned=estimatedEarnedWk+projectedRemainingEarned;
        const projectedTotalActual=totalActualHrsWk+remainingPlanned+remainingScheduledExtra;
        const projectedVariance=projectedTotalActual-projectedTotalEarned;
        const projectedTolerance=projectedTotalEarned*0.02;
        const hrsToTarget=projectedVariance>projectedTolerance?projectedVariance-projectedTolerance:projectedVariance<-projectedTolerance?projectedVariance+projectedTolerance:0;
        const withinTarget=hasEarnedData&&Math.abs(projectedVariance)<=projectedTolerance;

        // Week setup derived
        const wPl=parseFloat(weekSetup.projPlanned)||0;
        const wSc=parseFloat(weekSetup.projScheduled)||0;
        const wEx=Math.max(0,wSc-wPl);
        const wBmp=wPl>0?wEx/wPl:0;
        const wTSD=parseFloat(weekSetup.projTSD)||0;
        const wNewTSD=wTSD>0?Math.round(wTSD*(1+wBmp)):0;
        const wRemaining=Math.max(0,wEx-netWk);
        const weekBalanced=wEx>0&&Math.abs(wEx-netWk)<0.25;
        const weekOver=wEx>0&&netWk>wEx;

        return ce("div",null,
          // Header
          ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
            ce("div",{style:{fontFamily:"Georgia,serif",fontSize:18,fontWeight:700,color:SB.darkGreen}},"Week View"),
            ce("div",{style:{display:"flex",gap:8}},
              weekTab==="summary"&&anyData&&ce("button",{onClick:()=>window.print(),style:{padding:"8px 14px",borderRadius:8,border:"none",background:SB.green,color:SB.white,fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,cursor:"pointer"}},"🖨 Print"),
              ce("button",{onClick:resetWeek,style:{padding:"8px 14px",borderRadius:8,border:"2px solid "+SB.red,background:"transparent",color:SB.red,fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,cursor:"pointer"}},"🔄 Reset")
            )
          ),
          // Sub-tabs
          ce("div",{style:{display:"flex",background:"#e8e4dc",borderRadius:10,padding:4,marginBottom:16,gap:4}},
            ce("button",{onClick:()=>setWeekTab("setup"),style:{flex:1,padding:"9px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,background:weekTab==="setup"?SB.darkGreen:"transparent",color:weekTab==="setup"?SB.white:SB.gray}},"📋 Week Setup"),
            ce("button",{onClick:()=>setWeekTab("summary"),style:{flex:1,padding:"9px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:12,fontWeight:700,background:weekTab==="summary"?SB.darkGreen:"transparent",color:weekTab==="summary"?SB.white:SB.gray}},"📊 Summary")
          ),

          // ── WEEK SETUP ──────────────────────────────────────────────────────
          weekTab==="setup"&&ce("div",null,
            ce("div",{style:{background:SB.white,border:"1px solid #d8e1dc",borderRadius:12,padding:"18px 16px",marginBottom:14}},
              ce(Lbl,null,"Week of"),
              ce("input",{type:"text",placeholder:"e.g. Week of May 6",value:weekSetup.weekOf||"",onChange:e=>setWeekSetup(x=>({...x,weekOf:e.target.value})),style:{...INP,marginBottom:14}}),
              ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}},
                ce("div",null,
                  ce(Lbl,null,"Total Planned Hrs (week)"),
                  ce("input",{type:"number",inputMode:"decimal",placeholder:"e.g. 340",value:weekSetup.projPlanned,onChange:e=>setWeekSetup(x=>({...x,projPlanned:e.target.value})),style:INP})
                ),
                ce("div",null,
                  ce(Lbl,null,"Total Scheduled Hrs (week)"),
                  ce("input",{type:"number",inputMode:"decimal",placeholder:"e.g. 380",value:weekSetup.projScheduled,onChange:e=>setWeekSetup(x=>({...x,projScheduled:e.target.value})),style:INP})
                )
              ),
              ce(Lbl,null,"Projected Weekly TSD"),
              ce("input",{type:"number",inputMode:"numeric",placeholder:"e.g. 3200",value:weekSetup.projTSD,onChange:e=>setWeekSetup(x=>({...x,projTSD:e.target.value})),style:{...INP,marginBottom:14}}),

              wPl>0&&wSc>0&&ce("div",{style:{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}},
                ce(Pill,{label:"Weekly Extra Hrs",value:"+"+wEx.toFixed(2),color:SB.gold}),
                ce(Pill,{label:"Weekly Bump %",value:(wBmp*100).toFixed(1)+"%",color:SB.green}),
                ce(Pill,{label:"New Weekly TSD",value:wNewTSD||"Enter TSD",color:SB.darkGreen})
              ),
              ce(Lbl,null,"Week Notes / Goals"),
              ce("textarea",{rows:3,placeholder:"e.g. Convention week — expect higher volume Mon-Wed, watch labor closely Thu-Fri...",value:weekSetup.weekNote,onChange:e=>setWeekSetup(x=>({...x,weekNote:e.target.value})),style:{...INP,fontSize:13,resize:"vertical"}})
            ),
            // Weekly labor target
            wEx>0&&ce("div",{style:{background:SB.darkGreen,borderRadius:12,padding:"16px 18px",marginBottom:14}},
              ce("div",{style:{fontSize:9,color:SB.lightGreen,textTransform:"uppercase",letterSpacing:"0.15em",marginBottom:12,fontFamily:"sans-serif"}},"Weekly Labor Target"),
              ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}},
                ce("div",{style:{textAlign:"center"}},
                  ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.lightGreen,marginBottom:4}},"Total extra scheduled"),
                  ce("div",{style:{fontFamily:"Georgia,serif",fontSize:22,fontWeight:700,color:SB.gold}},"+"+wEx.toFixed(2)),
                  ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.lightGreen,marginTop:2}},"hrs this week")
                ),
                ce("div",{style:{textAlign:"center"}},
                  ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.lightGreen,marginBottom:4}},"Net cut so far"),
                  ce("div",{style:{fontFamily:"Georgia,serif",fontSize:22,fontWeight:700,color:netWk>0?SB.white:"#6fcf97"}},netWk>=0?"−"+netWk.toFixed(2):"+"+Math.abs(netWk).toFixed(2)),
                  ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.lightGreen,marginTop:2}},"hrs adjusted")
                ),
                ce("div",{style:{textAlign:"center"}},
                  ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.lightGreen,marginBottom:4}},weekBalanced?"Status":weekOver?"Over-cut":"Still to cut"),
                  ce("div",{style:{fontFamily:"Georgia,serif",fontSize:22,fontWeight:700,color:weekBalanced?"#6fcf97":weekOver?"#f1948a":SB.white}},
                    weekBalanced?"✓":weekOver?"+"+Math.abs(netWk-wEx).toFixed(2):"−"+wRemaining.toFixed(2)
                  ),
                  ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.lightGreen,marginTop:2}},weekBalanced?"balanced":weekOver?"over-cut":"hrs remaining")
                )
              )
            ),
            ce("button",{onClick:saveWeekSetup,style:{width:"100%",padding:"13px",borderRadius:10,border:"none",background:SB.green,color:SB.white,fontFamily:"Georgia,serif",fontSize:13,fontWeight:700,cursor:"pointer"}},"💾 Save Week Setup"),
            saveMsg&&ce("div",{style:{textAlign:"center",fontSize:13,fontWeight:700,color:saveMsg.includes("fail")?SB.red:SB.green,padding:"6px 0",marginTop:4}},saveMsg)
          ),

          // ── WEEK SUMMARY ──────────────────────────────────────────────────────
          weekTab==="summary"&&ce("div",null,
            !anyData
              ?ce("div",{style:{textAlign:"center",padding:"40px 20px",color:SB.gray,fontSize:13,background:SB.white,borderRadius:12,border:"1px solid #ddd"}},"No published days yet this week. Set up and publish each day to see the summary here.")
              :ce("div",null,
                // Summary pills
                ce("div",{style:{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}},
                  ce(Pill,{label:"Total Extra Scheduled",value:"+"+totalExWk.toFixed(2),color:SB.gold}),
                  ce(Pill,{label:"Net Adjustment",value:(netWk>=0?"−":"+")+Math.abs(netWk).toFixed(2)+" hrs",color:netWk>0?SB.red:netWk<0?SB.blue:SB.green}),
                  ce(Pill,{label:"Cut / Added",value:"−"+totalCutWk.toFixed(2)+" / +"+totalAddWk.toFixed(2),color:SB.gray})
                ),
                // Reconciliation banner — earned hours vs actual labor run
                !hasEarnedData&&ce("div",{style:{background:"#f7f6f2",border:"1px dashed #ccc",borderRadius:10,padding:"14px 16px",marginBottom:14,textAlign:"center",fontFamily:"sans-serif",fontSize:13,color:SB.gray}},
                  "Enter actuals on the Live Tracking tab to see your ±2% estimate."
                ),
                hasEarnedData&&(()=>{
                  const pct=projectedTotalEarned>0?(projectedVariance/projectedTotalEarned)*100:0;
                  const isOver=projectedVariance>projectedTolerance;
                  const isUnder=projectedVariance<-projectedTolerance;
                  const color=withinTarget?SB.green:isOver?SB.red:SB.blue;
                  const bg=withinTarget?SB.darkGreen:isOver?"#fff5f5":"#f0f6fb";
                  return ce("div",{style:{background:bg,border:"2px solid "+color,borderRadius:12,padding:"16px",marginBottom:14}},
                    // Status + % at a glance
                    ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
                      ce("div",null,
                        ce("div",{style:{fontFamily:"sans-serif",fontSize:11,textTransform:"uppercase",letterSpacing:1,color:withinTarget?SB.lightGreen:color,fontWeight:600,marginBottom:3}},
                          withinTarget?"✓ On Track for ±2%":isOver?"Action Needed — Over Earned Labor":"Under Earned Labor"
                        ),
                        ce("div",{style:{fontFamily:"sans-serif",fontSize:12,color:withinTarget?"#d4e9e2":"#666"}},
                          withinTarget
                            ? "Projected to land within ±2% of earned labor for the week."
                            : isOver
                            ? "Cut "+hrsToTarget.toFixed(2)+" more hrs across remaining days to hit ±2% target."
                            : "You're "+Math.abs(hrsToTarget).toFixed(2)+" hrs under — room to add labor if sales support it."
                        )
                      ),
                      ce("div",{style:{textAlign:"right",flexShrink:0,marginLeft:12}},
                        ce("div",{style:{fontFamily:"Georgia,serif",fontSize:28,fontWeight:700,color:withinTarget?SB.white:color}},
                          (pct>0?"+":"")+pct.toFixed(1)+"%"
                        ),
                        ce("div",{style:{fontFamily:"sans-serif",fontSize:10,color:withinTarget?SB.lightGreen:"#999",marginTop:1}},"projected variance")
                      )
                    ),
                    // Detail rows
                    ce("div",{style:{borderTop:"1px solid "+(withinTarget?"rgba(255,255,255,0.2)":"#e8e8e8"),paddingTop:10,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontFamily:"sans-serif",fontSize:12}}
                      ,
                      ce("div",null,
                        ce("div",{style:{color:withinTarget?SB.lightGreen:"#999",fontSize:10,textTransform:"uppercase",letterSpacing:1,marginBottom:3}},"Est. earned so far"),
                        ce("div",{style:{fontWeight:700,color:withinTarget?SB.white:SB.darkGreen}},estimatedEarnedWk.toFixed(2)+" hrs")
                      ),
                      ce("div",null,
                        ce("div",{style:{color:withinTarget?SB.lightGreen:"#999",fontSize:10,textTransform:"uppercase",letterSpacing:1,marginBottom:3}},"Actual hrs run so far"),
                        ce("div",{style:{fontWeight:700,color:withinTarget?SB.white:SB.darkGreen}},totalActualHrsWk.toFixed(2)+" hrs")
                      ),

                      daysRemaining.length>0&&ce("div",null,
                        ce("div",{style:{color:withinTarget?SB.lightGreen:"#999",fontSize:10,textTransform:"uppercase",letterSpacing:1,marginBottom:3}},"Remaining days extra"),
                        ce("div",{style:{fontWeight:700,color:withinTarget?SB.white:isOver?SB.red:SB.blue}},"+"+remainingScheduledExtra.toFixed(2)+" hrs still scheduled")
                      )
                    ),
                    // Action callout — only when action needed
                    ce("div",{style:{marginTop:8,fontFamily:"sans-serif",fontSize:10,color:withinTarget?SB.lightGreen:"#999",fontStyle:"italic"}},"Estimate: planned hrs + TSD-justified extra. Compare to your Weekly Hours Report for exact figures."),
                    ce("div",{style:{marginTop:10,padding:"12px 14px",background:withinTarget?"rgba(0,112,74,0.12)":isOver?"rgba(192,57,43,0.1)":"rgba(26,96,145,0.1)",borderRadius:8,fontFamily:"sans-serif",fontSize:14,fontWeight:700,color:withinTarget?SB.green:color,textAlign:"center",lineHeight:1.5}},
                      withinTarget
                        ? "✅ You're within ±2% — no action needed for the week"
                        : isOver
                        ? "✂️ You need to cut "+hrsToTarget.toFixed(2)+" hrs for the week to hit your ±2% goal"
                        : "➕ You could add "+Math.abs(hrsToTarget).toFixed(2)+" hrs for the week and still stay within your ±2% goal"
                    )
                  );
                })(),
                // Day cards
                weekData.map((d,i)=>ce("div",{key:i,style:{background:SB.white,border:"1px solid #d8e1dc",borderRadius:12,marginBottom:12,overflow:"hidden"}},
                  ce("div",{style:{background:d.pub?SB.darkGreen:"#888",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
                    ce("div",{style:{color:SB.white,fontWeight:700,fontSize:15}},d.day+(d.label&&d.label!==d.day?" — "+d.label:"")),
                    ce("div",{style:{fontFamily:"sans-serif",fontSize:11,color:SB.lightGreen}},d.pub?"Published":"Not set up")
                  ),
                  d.pub&&ce("div",{style:{padding:"12px 16px"}},
                    ce("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:d.cutsLog.length>0||d.note?12:0}},
                      ce("div",{style:{textAlign:"center"}},
                        ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.gray,textTransform:"uppercase",letterSpacing:1,marginBottom:3}},"Extra Scheduled"),
                        ce("div",{style:{fontFamily:"Georgia,serif",fontSize:16,fontWeight:700,color:SB.gold}},"+"+d.extra.toFixed(2)+" hrs")
                      ),
                      ce("div",{style:{textAlign:"center"}},
                        ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.gray,textTransform:"uppercase",letterSpacing:1,marginBottom:3}},"Net Adjustment"),
                        ce("div",{style:{fontFamily:"Georgia,serif",fontSize:16,fontWeight:700,color:d.net>0?SB.red:d.net<0?SB.blue:SB.gray}},
                          d.net!==0?(d.net>0?"−":"+")+Math.abs(d.net).toFixed(2)+" hrs":"None"
                        ),
                        d.adds>0&&ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.gray,marginTop:1}},"cut "+d.cuts.toFixed(2)+" · added "+d.adds.toFixed(2))
                      ),
                      ce("div",{style:{textAlign:"center"}},
                        ce("div",{style:{fontFamily:"sans-serif",fontSize:9,color:SB.gray,textTransform:"uppercase",letterSpacing:1,marginBottom:3}},"Final TXN"),
                        ce("div",{style:{fontFamily:"Georgia,serif",fontSize:16,fontWeight:700,color:SB.darkGreen}},d.ftxn!==null?d.ftxn:"—")
                      )
                    ),
                    d.note&&ce("div",{style:{background:"#fffdf0",border:"1px solid #e8d98b",borderRadius:6,padding:"8px 10px",marginBottom:d.cutsLog.length>0?10:0,fontFamily:"sans-serif",fontSize:12,color:"#7a6400"}},"📋 "+d.note),
                    d.cutsLog.length>0&&ce("div",null,
                      ce("div",{style:{fontFamily:"sans-serif",fontSize:10,textTransform:"uppercase",letterSpacing:1,color:SB.gray,marginBottom:6}},"Labor Adjustments"),
                      d.cutsLog.map((c,j)=>ce("div",{key:j,style:{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:j<d.cutsLog.length-1?"1px solid #f0f0ea":"none"}},
                        ce("span",{style:{fontFamily:"sans-serif",fontSize:12,color:c.type==="add"?SB.blue:SB.red,fontWeight:600}},
                          (c.type==="add"?"＋":"−")+c.hrs.toFixed(2)+" hrs @ "+new Date(c.time).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})+(c.who?" · "+c.who:"")
                        ),
                        c.note&&ce("span",{style:{fontFamily:"sans-serif",fontSize:11,color:SB.gray}},c.note)
                      ))
                    )
                  ),
                  !d.pub&&ce("div",{style:{padding:"12px 16px",fontFamily:"sans-serif",fontSize:12,color:SB.gray}},"No data — tap ",ce("b",null,d.day)," above to set it up.")
                ))
              )
          )
        );
      })()
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
